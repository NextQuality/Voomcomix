<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>All Stories — VoomComix</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0c0c10;--card:#16161e;--red:#e8312a;--gold:#f5a623;--teal:#00c4b4;--white:#f5f0e8;--muted:#7a7080;--border:rgba(255,255,255,0.07);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Libre Baskerville',serif;}
a{text-decoration:none;color:inherit;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(12,12,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(232,49,42,0.15);padding:0 48px;height:62px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue';font-size:1.9rem;letter-spacing:.1em;}
.logo .v{color:var(--red);}
.nav-r a{font-family:'Rajdhani';font-size:.78rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-left:24px;transition:color .2s;}
.nav-r a:hover,.nav-r a.active{color:var(--white);}

.page-header{padding:100px 48px 36px;border-bottom:1px solid var(--border);}
.page-header h1{font-family:'Bebas Neue';font-size:3.2rem;letter-spacing:.05em;}
.page-header h1 span{color:var(--red);}
.page-header p{font-family:'Rajdhani';font-size:.8rem;color:var(--muted);letter-spacing:.12em;margin-top:6px;}

.filters{padding:20px 48px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.filter-btn{font-family:'Rajdhani';font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:6px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--red);color:var(--red);}

.search-bar{padding:18px 48px;display:flex;gap:0;border-bottom:1px solid var(--border);}
.search-bar input{flex:1;max-width:380px;background:var(--card);border:1px solid var(--border);border-right:none;color:var(--white);padding:9px 14px;font-family:'Rajdhani';font-size:.85rem;outline:none;}
.search-bar input:focus{border-color:rgba(232,49,42,.4);}
.search-bar input::placeholder{color:var(--muted);}
.search-bar button{background:var(--red);color:#fff;border:none;padding:9px 20px;font-family:'Rajdhani';font-size:.75rem;font-weight:700;letter-spacing:.12em;cursor:pointer;}

/* BOOK GRID */
.books-container{padding:36px 48px 80px;}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:24px;}

.book-card{cursor:pointer;transition:transform .3s;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.book-card:hover{transform:translateY(-6px);}
.book-cover-wrap{position:relative;width:100%;aspect-ratio:2/3;margin-bottom:10px;box-shadow:0 8px 24px rgba(0,0,0,.5);border-radius:3px 6px 6px 3px;}
.book-cover-wrap img,.book-cover-fallback{width:100%;height:100%;object-fit:cover;border-radius:3px 6px 6px 3px;}
.book-cover-fallback{display:flex;align-items:center;justify-content:center;font-size:2.8rem;}
.book-cover-wrap::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:10px;background:linear-gradient(90deg,rgba(0,0,0,.5),rgba(0,0,0,.15));border-radius:3px 0 0 3px;z-index:1;}
.book-cover-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,.05) 0%,transparent 60%);border-radius:3px 6px 6px 3px;pointer-events:none;z-index:2;}
.b-status{position:absolute;top:7px;left:7px;font-family:'Rajdhani';font-size:.52rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:2px 6px;z-index:3;}
.b-lang{position:absolute;top:7px;right:7px;font-family:'Rajdhani';font-size:.52rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:2px 6px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.08);color:rgba(245,240,232,.6);z-index:3;}
.s-ongoing{background:var(--red);color:#fff;}
.s-complete{background:#00a651;color:#fff;}
.s-hiatus{background:#555;color:#fff;}

.book-title{font-family:'Rajdhani';font-size:.85rem;font-weight:700;letter-spacing:.03em;line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.book-genre{font-family:'Rajdhani';font-size:.62rem;color:var(--gold);letter-spacing:.1em;margin-bottom:3px;}
.book-meta{font-family:'Rajdhani';font-size:.6rem;color:var(--muted);display:flex;gap:8px;}

.no-results{text-align:center;padding:80px;font-family:'Rajdhani';font-size:.9rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}

footer{border-top:1px solid var(--border);padding:24px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.foot-logo{font-family:'Bebas Neue';font-size:1.3rem;letter-spacing:.1em;}
.foot-logo .v{color:var(--red);}
footer p{font-family:'Rajdhani';font-size:.68rem;color:var(--muted);}
.foot-links a{font-family:'Rajdhani';font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-left:16px;transition:color .2s;}
.foot-links a:hover{color:var(--red);}

@media(max-width:768px){
  nav,.page-header,.filters,.search-bar,.books-container,footer{padding-left:20px;padding-right:20px;}
  .books-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:16px;}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><span class="v">V</span>OOM<span class="v">C</span>OMIX</a>
  <div class="nav-r">
    <a href="stories.html" class="active">Stories</a>
    <a href="about.html">About</a>
    <a href="terms.html">Terms</a>
  </div>
</nav>

<div class="page-header">
  <h1>ALL <span>STORIES</span></h1>
  <p id="stories-count">Loading...</p>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterBy('all',this)">All</button>
  <button class="filter-btn" onclick="filterBy('ongoing',this)">Ongoing</button>
  <button class="filter-btn" onclick="filterBy('complete',this)">Complete</button>
  <button class="filter-btn" onclick="filterBy('hiatus',this)">Hiatus</button>
  <button class="filter-btn" onclick="filterLang('Hindi',this)">Hindi</button>
  <button class="filter-btn" onclick="filterLang('English',this)">English</button>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search stories, genres, tags..." oninput="doSearch()"/>
  <button onclick="doSearch()">Search</button>
</div>

<div class="books-container">
  <div class="books-grid" id="books-grid"></div>
  <div class="no-results" id="no-res" style="display:none">No stories found</div>
</div>

<footer>
  <a href="index.html" class="foot-logo"><span class="v">V</span>OOMCOMIX</a>
  <p>© 2024 VoomComix · Mr. Imtiyaz Sheikh</p>
  <div class="foot-links">
    <a href="about.html">About</a>
    <a href="terms.html">Terms</a>
  </div>
</footer>

<script src="stories-data.js"></script>
<script>
let all=loadData(), curStatus='all', curLang='all', curQ='';

function getFiltered(){
  return all.filter(s=>{
    const ms=curStatus==='all'||s.status===curStatus;
    const ml=curLang==='all'||s.language===curLang;
    const q=curQ.toLowerCase();
    const mq=!q||s.title.toLowerCase().includes(q)||s.genre.toLowerCase().includes(q)||(s.tags||[]).some(t=>t.toLowerCase().includes(q));
    return ms&&ml&&mq;
  });
}

function render(list){
  const g=document.getElementById('books-grid');
  const nr=document.getElementById('no-res');
  if(!list.length){g.innerHTML='';nr.style.display='block';return;}
  nr.style.display='none';
  g.innerHTML=list.map((s,i)=>{
    const cover=s.cover&&s.cover.trim()?`<img src="${s.cover}" alt="${s.title}"/>`:`<div class="book-cover-fallback" style="background:${s.coverColor}">${s.coverEmoji||'📖'}</div>`;
    const sc=`s-${s.status}`;
    const st=s.status.charAt(0).toUpperCase()+s.status.slice(1);
    return `<div class="book-card" style="animation-delay:${i*.06}s" onclick="location.href='story.html?id=${s.id}'">
      <div class="book-cover-wrap">${cover}
        <span class="b-status ${sc}">${st}</span>
        <span class="b-lang">${s.language}</span>
      </div>
      <div class="book-title">${s.title}</div>
      <div class="book-genre">${s.genre}</div>
      <div class="book-meta"><span>📖 ${s.chapters.length} Ch</span><span>⭐ ${s.rating}</span></div>
    </div>`;
  }).join('');
  document.getElementById('stories-count').textContent=`${list.length} ${list.length===1?'story':'stories'} found`;
}

function filterBy(status,btn){
  curStatus=status;curLang='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');render(getFiltered());
}
function filterLang(lang,btn){
  curLang=curLang===lang?'all':lang;curStatus='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(curLang!=='all')btn.classList.add('active');render(getFiltered());
}
function doSearch(){curQ=document.getElementById('search').value;render(getFiltered());}

render(all);
</script>
</body>
</html>
