<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>All Stories — VoomComix</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f0f14;--card:#141420;--red:#e63022;--gold:#f0a500;--white:#fdfaf4;--muted:#6a6478;--border:rgba(255,255,255,0.07);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Libre Baskerville',serif;}
a{text-decoration:none;color:inherit;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,13,13,0.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(230,48,34,0.2);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:.1em;}
.logo span{color:var(--red);}
.nav-r{display:flex;align-items:center;gap:20px;}
.nav-r a{font-family:'Rajdhani';font-size:.8rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);transition:color .2s;}
.nav-r a:hover,.nav-r a.active{color:var(--white);}

.page-header{padding:110px 40px 40px;border-bottom:1px solid var(--border);}
.page-header h1{font-family:'Bebas Neue';font-size:3.5rem;letter-spacing:.05em;margin-bottom:8px;}
.page-header h1 span{color:var(--red);}
.page-header p{font-family:'Rajdhani';font-size:.85rem;color:var(--muted);letter-spacing:.1em;}

/* FILTERS */
.filters{padding:24px 40px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:rgba(255,255,255,.01);}
.filter-btn{font-family:'Rajdhani';font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:6px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--red);color:var(--red);background:rgba(230,48,34,.06);}

/* SEARCH */
.search-bar{padding:20px 40px;display:flex;gap:0;}
.search-bar input{flex:1;max-width:400px;background:var(--card);border:1px solid var(--border);border-right:none;color:var(--white);padding:10px 16px;font-family:'Rajdhani';font-size:.88rem;outline:none;}
.search-bar input::placeholder{color:var(--muted);}
.search-bar input:focus{border-color:rgba(230,48,34,.4);}
.search-bar button{background:var(--red);color:#fff;border:none;padding:10px 20px;font-family:'Rajdhani';font-size:.78rem;font-weight:700;letter-spacing:.12em;cursor:pointer;}

/* GRID */
.stories-container{padding:30px 40px 80px;}
.stories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:22px;}
.story-card{background:var(--card);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .3s;position:relative;}
.story-card:hover{border-color:rgba(230,48,34,.4);transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.5),4px 4px 0 var(--red);}
.story-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--gold));transform:scaleX(0);transition:transform .3s;transform-origin:left;}
.story-card:hover::after{transform:scaleX(1);}
.s-cover{width:100%;height:170px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative;}
.s-badge{position:absolute;top:10px;left:10px;font-family:'Rajdhani';font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:3px 8px;}
.badge-ongoing{background:var(--red);color:#fff;}
.badge-complete{background:#00a651;color:#fff;}
.badge-hiatus{background:#555;color:#fff;}
.s-lang{position:absolute;top:10px;right:10px;font-family:'Rajdhani';font-size:.58rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);color:rgba(253,250,244,.7);}
.s-body{padding:18px 20px 20px;}
.s-genre{font-family:'Rajdhani';font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
.s-title{font-family:'Bebas Neue';font-size:1.3rem;letter-spacing:.04em;margin-bottom:8px;line-height:1.1;}
.s-desc{font-size:.8rem;color:rgba(253,250,244,.4);line-height:1.5;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.s-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.s-tag{font-family:'Rajdhani';font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border:1px solid var(--border);color:var(--muted);}
.s-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:12px;}
.s-meta{font-family:'Rajdhani';font-size:.68rem;color:var(--muted);}
.s-rating{font-family:'Rajdhani';font-size:.72rem;font-weight:700;color:var(--gold);}
.read-btn{display:block;margin-top:10px;font-family:'Rajdhani';font-size:.78rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;background:var(--red);color:#fff;padding:8px;text-align:center;transition:background .2s;}
.read-btn:hover{background:var(--gold);color:#000;}

.no-results{text-align:center;padding:80px 20px;font-family:'Rajdhani';font-size:1rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}

footer{border-top:1px solid var(--border);padding:30px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.foot-logo{font-family:'Bebas Neue';font-size:1.3rem;letter-spacing:.1em;}
.foot-logo span{color:var(--red);}
footer p{font-family:'Rajdhani';font-size:.7rem;color:var(--muted);}
.foot-links a{font-family:'Rajdhani';font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-left:16px;transition:color .2s;}
.foot-links a:hover{color:var(--red);}

@media(max-width:768px){
  nav{padding:0 20px;}
  .page-header,.filters,.search-bar,.stories-container{padding-left:20px;padding-right:20px;}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">VOOM<span>COMIX</span></a>
  <div class="nav-r">
    <a href="stories.html" class="active">Stories</a>
    <a href="about.html">About</a>
    <a href="terms.html">Terms</a>
  </div>
</nav>

<div class="page-header">
  <h1>ALL <span>STORIES</span></h1>
  <p id="story-count">Loading stories...</p>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterStories('all',this)">All</button>
  <button class="filter-btn" onclick="filterStories('ongoing',this)">Ongoing</button>
  <button class="filter-btn" onclick="filterStories('complete',this)">Complete</button>
  <button class="filter-btn" onclick="filterStories('hiatus',this)">Hiatus</button>
  <button class="filter-btn" onclick="filterLang('Hindi',this)">Hindi</button>
  <button class="filter-btn" onclick="filterLang('English',this)">English</button>
</div>

<div class="search-bar">
  <input type="text" id="search-input" placeholder="Search stories, genres, tags..." oninput="searchStories()"/>
  <button onclick="searchStories()">Search</button>
</div>

<div class="stories-container">
  <div class="stories-grid" id="stories-grid"></div>
  <div class="no-results" id="no-results" style="display:none;">No stories found</div>
</div>

<footer>
  <a href="index.html" class="foot-logo">VOOM<span>COMIX</span></a>
  <p>© 2024 VoomComix</p>
  <div class="foot-links">
    <a href="about.html">About</a>
    <a href="terms.html">Terms</a>
    <a href="admin.html">Admin</a>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://gcpbvzyndmwdlvopftma.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjcGJ2enluZG13ZGx2b3BmdG1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjQ0MzcsImV4cCI6MjA4ODgwMDQzN30.pqv_VcOxGrpxPfQXAaey_wF85yiC0hgNDJBD6f7MyXk';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let allStories = [];

// Load from Supabase
async function initStories() {
  const { data, error } = await sb
    .from('stories')
    .select('*, profiles(display_name, username)')
    .eq('approval_status', 'approved')
    .order('created_at', { ascending: false });

  if (!error && data) {
    allStories = data.map(s => ({
      id: s.id,
      title: s.title,
      genre: s.genre || 'General',
      type: s.story_type || 'novel',
      status: s.status || 'ongoing',
      description: s.description || '',
      cover: s.cover_url ? `<img src="${s.cover_url}" style="width:100%;height:100%;object-fit:cover;" alt=""/>` : (s.story_type==='manga'?'🎌':s.story_type==='comic'?'📚':'📖'),
      coverColor: '#1a0a05',
      views: s.view_count || 0,
      likes: s.like_count || 0,
      language: s.language || 'english',
      tags: s.tags || [],
      rating: '4.5',
      chapters: [],
      author: s.profiles?.display_name || 'VoomComix',
      created_at: s.created_at
    }));
  }
  renderStories(allStories);
}
let currentFilter = 'all';
let currentLang = 'all';
let currentSearch = '';

function renderStories(list) {
  const grid = document.getElementById('stories-grid');
  const noRes = document.getElementById('no-results');
  if(!list.length){ grid.innerHTML=''; noRes.style.display='block'; return; }
  noRes.style.display='none';
  grid.innerHTML = list.map((s,i)=>`
  <div class="story-card" style="animation:fadeUp .4s ease ${i*0.07}s both" onclick="location.href='story.html?id=${s.id}'">
    <div class="s-cover" style="background:${s.coverColor||'#1a0a05'}">${s.cover||'📖'}
      <span class="s-badge badge-${s.status||'ongoing'}">${(s.status||'ongoing').charAt(0).toUpperCase()+(s.status||'ongoing').slice(1)}</span>
      <span class="s-lang">${s.language||'English'}</span>
    </div>
    <div class="s-body">
      <div class="s-genre">${s.genre}</div>
      <div class="s-title">${s.title}</div>
      <div class="s-desc">${s.description}</div>
      <div class="s-tags">${(s.tags||[]).map(t=>`<span class="s-tag">${t}</span>`).join('')}</div>
      <div class="s-foot">
        <span class="s-meta">👁 ${s.views||0} Views</span>
        <span class="s-rating">⭐ ${s.rating}</span>
      </div>
      <a class="read-btn">Start Reading →</a>
    </div>
  </div>`).join('');
  document.getElementById('story-count').textContent = `${list.length} ${list.length===1?'story':'stories'} found`;
}

function getFiltered(){
  return allStories.filter(s=>{
    const matchStatus = currentFilter==='all' || s.status===currentFilter;
    const matchLang = currentLang==='all' || s.language===currentLang;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || s.title.toLowerCase().includes(q) || s.genre.toLowerCase().includes(q) || (s.tags||[]).some(t=>t.toLowerCase().includes(q));
    return matchStatus && matchLang && matchSearch;
  });
}

function filterStories(status, btn){
  currentFilter=status; currentLang='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderStories(getFiltered());
}
function filterLang(lang, btn){
  currentLang = currentLang===lang?'all':lang; currentFilter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(currentLang!=='all') btn.classList.add('active');
  renderStories(getFiltered());
}
function searchStories(){
  currentSearch = document.getElementById('search-input').value;
  renderStories(getFiltered());
}

// Init — load from Supabase
initStories();

// Animate
const style=document.createElement('style');
style.textContent='@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}';
document.head.appendChild(style);
</script>
</body>
</html>
