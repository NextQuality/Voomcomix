<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Browse Stories — VoomComix</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
:root{--bg:#0e0e12;--bg2:#16161d;--bg3:#1e1e28;--card:#1a1a24;--red:#e8341c;--red2:#ff4d2e;--white:#f5efe6;--muted:#8a7a6a;--border:rgba(245,239,230,0.08);--radius:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px;}
#header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(14,14,18,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 28px;gap:16px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;flex-shrink:0;}
.logo span{color:var(--red);}
.search-wrap{flex:1;max-width:500px;position:relative;}
.search-wrap input{width:100%;padding:9px 40px 9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:14px;outline:none;transition:border .2s;font-family:'Inter',sans-serif;}
.search-wrap input:focus{border-color:var(--red);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;}
.btn{padding:7px 18px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
.btn-red{background:var(--red);color:#fff;}
.btn-outline{background:transparent;color:var(--white);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--red);color:var(--red);}

/* LAYOUT */
.browse-wrap{margin-top:60px;display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 60px);}

/* SIDEBAR FILTERS */
#filters-sidebar{
  background:var(--bg2);border-right:1px solid var(--border);
  padding:24px 16px;position:sticky;top:60px;
  height:calc(100vh - 60px);overflow-y:auto;
}
.filter-section{margin-bottom:24px;}
.filter-title{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
.filter-btn{
  display:block;width:100%;text-align:left;
  padding:8px 12px;border-radius:7px;font-size:13px;
  background:none;border:none;color:rgba(245,239,230,.7);
  cursor:pointer;transition:all .2s;margin-bottom:3px;
  font-family:'Inter',sans-serif;
}
.filter-btn:hover{background:var(--bg3);color:var(--white);}
.filter-btn.active{background:rgba(232,52,28,.1);color:var(--red);border-left:2px solid var(--red);}
.filter-check{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:7px;cursor:pointer;
  font-size:13px;color:rgba(245,239,230,.7);transition:all .2s;margin-bottom:3px;
}
.filter-check:hover{background:var(--bg3);color:var(--white);}
.filter-check input{accent-color:var(--red);cursor:pointer;}
.clear-btn{
  width:100%;padding:8px;border-radius:7px;background:none;
  border:1px solid var(--border);color:var(--muted);
  font-size:12px;cursor:pointer;transition:all .2s;
  font-family:'Rajdhani',sans-serif;font-weight:600;text-transform:uppercase;margin-top:8px;
}
.clear-btn:hover{border-color:var(--red);color:var(--red);}

/* MAIN CONTENT */
#browse-main{padding:24px 28px;}
.browse-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.browse-header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.3px;}
.browse-header h1 span{color:var(--red);}
.results-count{font-size:13px;color:var(--muted);}
.sort-wrap{display:flex;gap:8px;align-items:center;}
.sort-wrap label{font-size:12px;color:var(--muted);}
.sort-wrap select{padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--white);font-size:13px;outline:none;cursor:pointer;}

/* ACTIVE FILTERS PILLS */
.active-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.filter-pill{
  display:flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:20px;
  background:rgba(232,52,28,.1);border:1px solid rgba(232,52,28,.2);
  font-size:12px;color:var(--red);
  font-family:'Rajdhani',sans-serif;font-weight:600;
}
.filter-pill button{background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;line-height:1;}

/* BOOKS GRID */
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:18px;}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .25s;position:relative;}
.book-card:hover{transform:translateY(-4px);border-color:rgba(232,52,28,.35);box-shadow:0 10px 28px rgba(0,0,0,.4);}
.book-cover{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--bg3);display:block;}
.book-cover-placeholder{width:100%;aspect-ratio:2/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);}
.type-badge{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-family:'Rajdhani',sans-serif;}
.tb-novel{background:rgba(212,130,10,.9);color:#fff;}
.tb-manga{background:rgba(232,52,28,.9);color:#fff;}
.tb-comic{background:rgba(59,130,246,.9);color:#fff;}
.warning-badge{position:absolute;top:8px;right:8px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(220,38,38,.8);color:#fff;}
.book-info{padding:10px 12px;}
.book-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.book-author{font-size:11px;color:var(--muted);margin-bottom:6px;}
.book-stats{display:flex;gap:8px;}
.bstat{font-size:10px;color:var(--muted);}

/* PAGINATION */
.pagination{display:flex;gap:6px;justify-content:center;margin-top:32px;flex-wrap:wrap;}
.page-btn{padding:8px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--white);transition:all .2s;font-family:'Rajdhani',sans-serif;}
.page-btn:hover,.page-btn.active{background:var(--red);border-color:var(--red);color:#fff;}
.page-btn:disabled{opacity:.3;cursor:not-allowed;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .es-icon{font-size:48px;margin-bottom:16px;}
.empty-state h3{font-family:'Bebas Neue',sans-serif;font-size:24px;margin-bottom:8px;color:var(--white);}
.empty-state p{font-size:14px;}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:900px){
  .browse-wrap{grid-template-columns:1fr;}
  #filters-sidebar{display:none;}
  #browse-main{padding:20px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <a href="index.html" class="logo">VOOM<span>COMIX</span></a>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search stories, authors, genres..." oninput="onSearchInput()"/>
    <button class="search-icon" onclick="applyFilters()">🔍</button>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <a href="index.html" class="btn btn-outline">Home</a>
    <a href="login.html" class="btn btn-red">Login</a>
  </div>
</header>

<div class="browse-wrap">

  <!-- FILTERS SIDEBAR -->
  <aside id="filters-sidebar">
    <div class="filter-section">
      <div class="filter-title">Type</div>
      <button class="filter-btn active" onclick="setType('')">All Types</button>
      <button class="filter-btn" onclick="setType('novel')">📖 Novel</button>
      <button class="filter-btn" onclick="setType('manga')">🎌 Manga</button>
      <button class="filter-btn" onclick="setType('comic')">💥 Comic</button>
    </div>

    <div class="filter-section">
      <div class="filter-title">Sort By</div>
      <button class="filter-btn active" onclick="setSort('new')">🆕 Newest</button>
      <button class="filter-btn" onclick="setSort('top')">🔥 Most Views</button>
      <button class="filter-btn" onclick="setSort('ranking')">🏆 Top Ranked</button>
      <button class="filter-btn" onclick="setSort('followers')">❤️ Most Followed</button>
    </div>

    <div class="filter-section">
      <div class="filter-title">Language</div>
      <button class="filter-btn active" onclick="setLang('')">All Languages</button>
      <button class="filter-btn" onclick="setLang('English')">English</button>
      <button class="filter-btn" onclick="setLang('Hindi')">Hindi</button>
      <button class="filter-btn" onclick="setLang('Marathi')">Marathi</button>
      <button class="filter-btn" onclick="setLang('Telugu')">Telugu</button>
      <button class="filter-btn" onclick="setLang('Tamil')">Tamil</button>
      <button class="filter-btn" onclick="setLang('Kannada')">Kannada</button>
      <button class="filter-btn" onclick="setLang('Bengali')">Bengali</button>
      <button class="filter-btn" onclick="setLang('Malayalam')">Malayalam</button>
      <button class="filter-btn" onclick="setLang('Gujarati')">Gujarati</button>
    </div>

    <div class="filter-section">
      <div class="filter-title">Genre</div>
      <label class="filter-check"><input type="checkbox" value="action" onchange="toggleGenre('action')"/> ⚔️ Action</label>
      <label class="filter-check"><input type="checkbox" value="romance" onchange="toggleGenre('romance')"/> 💕 Romance</label>
      <label class="filter-check"><input type="checkbox" value="fantasy" onchange="toggleGenre('fantasy')"/> 🧙 Fantasy</label>
      <label class="filter-check"><input type="checkbox" value="thriller" onchange="toggleGenre('thriller')"/> 🔪 Thriller</label>
      <label class="filter-check"><input type="checkbox" value="horror" onchange="toggleGenre('horror')"/> 👻 Horror</label>
      <label class="filter-check"><input type="checkbox" value="comedy" onchange="toggleGenre('comedy')"/> 😂 Comedy</label>
      <label class="filter-check"><input type="checkbox" value="drama" onchange="toggleGenre('drama')"/> 🎭 Drama</label>
      <label class="filter-check"><input type="checkbox" value="mystery" onchange="toggleGenre('mystery')"/> 🔍 Mystery</label>
      <label class="filter-check"><input type="checkbox" value="sci-fi" onchange="toggleGenre('sci-fi')"/> 🚀 Sci-Fi</label>
      <label class="filter-check"><input type="checkbox" value="supernatural" onchange="toggleGenre('supernatural')"/> ✨ Supernatural</label>
      <label class="filter-check"><input type="checkbox" value="adventure" onchange="toggleGenre('adventure')"/> 🗺️ Adventure</label>
      <label class="filter-check"><input type="checkbox" value="isekai" onchange="toggleGenre('isekai')"/> 🌀 Isekai</label>
    </div>

    <div class="filter-section">
      <div class="filter-title">Rating</div>
      <button class="filter-btn active" onclick="setWarning('')">All Ages & 18+</button>
      <button class="filter-btn" onclick="setWarning('all')">🌐 All Ages Only</button>
      <button class="filter-btn" onclick="setWarning('18+')">🔞 18+ Only</button>
    </div>

    <div class="filter-section">
      <div class="filter-title">Length</div>
      <button class="filter-btn active" onclick="setLength('')">Any Length</button>
      <button class="filter-btn" onclick="setLength('short')">Short</button>
      <button class="filter-btn" onclick="setLength('medium')">Medium</button>
      <button class="filter-btn" onclick="setLength('long')">Long</button>
    </div>

    <button class="clear-btn" onclick="clearFilters()">Clear All Filters</button>
  </aside>

  <!-- MAIN -->
  <main id="browse-main">
    <div class="browse-header">
      <div>
        <h1 id="browse-title">Browse <span>Stories</span></h1>
        <div class="results-count" id="results-count">Loading...</div>
      </div>
      <div class="sort-wrap">
        <label>Sort:</label>
        <select id="sort-select" onchange="setSort(this.value)">
          <option value="new">Newest</option>
          <option value="top">Most Views</option>
          <option value="ranking">Top Ranked</option>
          <option value="followers">Most Followed</option>
        </select>
      </div>
    </div>

    <!-- Active filter pills -->
    <div class="active-filters" id="active-filters"></div>

    <!-- Books Grid -->
    <div class="books-grid" id="books-grid">
      <div class="skeleton" style="aspect-ratio:2/3;border-radius:10px;"></div>
      <div class="skeleton" style="aspect-ratio:2/3;border-radius:10px;"></div>
      <div class="skeleton" style="aspect-ratio:2/3;border-radius:10px;"></div>
      <div class="skeleton" style="aspect-ratio:2/3;border-radius:10px;"></div>
      <div class="skeleton" style="aspect-ratio:2/3;border-radius:10px;"></div>
      <div class="skeleton" style="aspect-ratio:2/3;border-radius:10px;"></div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script>
// ══════════════════════════
// STATE
// ══════════════════════════
let filters = {
  type: '', sort: 'new', lang: '', genres: [],
  warning: '', length: '', search: '', page: 1
};
const PER_PAGE = 24;
let totalCount = 0;

// ══════════════════════════
// INIT — read URL params
// ══════════════════════════
(async () => {
  const p = new URLSearchParams(window.location.search);
  if (p.get('type'))   filters.type   = p.get('type');
  if (p.get('sort'))   filters.sort   = p.get('sort');
  if (p.get('genre'))  filters.genres = [p.get('genre')];
  if (p.get('search')) filters.search = p.get('search');
  if (p.get('lang'))   filters.lang   = p.get('lang');
  document.getElementById('search-input').value = filters.search;
  syncSidebarUI();
  await loadBooks();
})();

// ══════════════════════════
// LOAD BOOKS
// ══════════════════════════
async function loadBooks() {
  const grid = document.getElementById('books-grid');
  grid.innerHTML = Array(6).fill('<div class="skeleton" style="aspect-ratio:2/3;border-radius:10px;"></div>').join('');

  let query = sb.from('books')
    .select('id,title,type,cover_image,genre,language,total_views,total_followers,total_reviews,warning,length_type,unique_code,users(username)', { count: 'exact' })
    .eq('status', 'active');

  if (filters.type)   query = query.eq('type', filters.type);
  if (filters.lang)   query = query.eq('language', filters.lang);
  if (filters.warning) query = query.eq('warning', filters.warning);
  if (filters.length) query = query.eq('length_type', filters.length);
  if (filters.genres.length) query = query.overlaps('genre', filters.genres);
  if (filters.search) {
    query = query.or(`title.ilike.%${filters.search}%`);
  }

  // Sort
  const sortMap = {
    new:       { col: 'created_at', asc: false },
    top:       { col: 'total_views', asc: false },
    ranking:   { col: 'total_reviews', asc: false },
    followers: { col: 'total_followers', asc: false },
  };
  const s = sortMap[filters.sort] || sortMap.new;
  query = query.order(s.col, { ascending: s.asc });

  // Pagination
  const from = (filters.page - 1) * PER_PAGE;
  query = query.range(from, from + PER_PAGE - 1);

  const { data, count, error } = await query;
  totalCount = count || 0;

  updateBrowseHeader();
  updateActivePills();
  renderBooks(data || []);
  renderPagination();
}

// ══════════════════════════
// RENDER BOOKS
// ══════════════════════════
function renderBooks(books) {
  const grid = document.getElementById('books-grid');
  if (!books.length) {
    grid.innerHTML = `
    <div class="empty-state" style="grid-column:1/-1;">
      <div class="es-icon">🔍</div>
      <h3>No Stories Found</h3>
      <p>Try adjusting your filters or search term.</p>
    </div>`;
    return;
  }
  grid.innerHTML = books.map(b => `
  <div class="book-card" onclick="window.location='book-detail.html?id=${b.id}'">
    ${b.cover_image
      ? `<img class="book-cover" src="${b.cover_image}" alt="${b.title}" loading="lazy"/>`
      : `<div class="book-cover-placeholder">No Cover</div>`}
    <span class="type-badge tb-${b.type||'novel'}">${b.type||'novel'}</span>
    ${b.warning === '18+' ? '<span class="warning-badge">18+</span>' : ''}
    <div class="book-info">
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.users?.username||'Unknown'}</div>
      <div class="book-stats">
        <span class="bstat">👁 ${fmt(b.total_views)}</span>
        <span class="bstat">❤️ ${fmt(b.total_followers)}</span>
      </div>
    </div>
  </div>`).join('');
}

// ══════════════════════════
// PAGINATION
// ══════════════════════════
function renderPagination() {
  const total = Math.ceil(totalCount / PER_PAGE);
  const pag   = document.getElementById('pagination');
  if (total <= 1) { pag.innerHTML = ''; return; }
  let html = '';
  html += `<button class="page-btn" onclick="goPage(${filters.page-1})" ${filters.page===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || Math.abs(i - filters.page) <= 2) {
      html += `<button class="page-btn ${i===filters.page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - filters.page) === 3) {
      html += `<span style="padding:8px 4px;color:var(--muted);">...</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${filters.page+1})" ${filters.page===total?'disabled':''}>›</button>`;
  pag.innerHTML = html;
}

function goPage(p) {
  filters.page = p;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  loadBooks();
}

// ══════════════════════════
// FILTER SETTERS
// ══════════════════════════
function setType(val) {
  filters.type = val; filters.page = 1;
  syncSidebarUI(); loadBooks();
}
function setSort(val) {
  filters.sort = val; filters.page = 1;
  document.getElementById('sort-select').value = val;
  syncSidebarUI(); loadBooks();
}
function setLang(val) {
  filters.lang = val; filters.page = 1;
  syncSidebarUI(); loadBooks();
}
function setWarning(val) {
  filters.warning = val; filters.page = 1;
  syncSidebarUI(); loadBooks();
}
function setLength(val) {
  filters.length = val; filters.page = 1;
  syncSidebarUI(); loadBooks();
}
function toggleGenre(val) {
  const idx = filters.genres.indexOf(val);
  if (idx === -1) filters.genres.push(val);
  else filters.genres.splice(idx, 1);
  filters.page = 1; loadBooks(); updateActivePills();
}

let searchTimer;
function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    filters.search = document.getElementById('search-input').value.trim();
    filters.page = 1; loadBooks();
  }, 400);
}

function clearFilters() {
  filters = { type:'', sort:'new', lang:'', genres:[], warning:'', length:'', search:'', page:1 };
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.filter-check input').forEach(i => i.checked = false);
  document.getElementById('sort-select').value = 'new';
  syncSidebarUI(); loadBooks();
}

// ══════════════════════════
// UI SYNC
// ══════════════════════════
function syncSidebarUI() {
  // Type buttons
  document.querySelectorAll('#filters-sidebar .filter-btn').forEach(btn => {
    const onClick = btn.getAttribute('onclick') || '';
    if (onClick.includes("setType(")) {
      const val = onClick.match(/setType\('(.*)'\)/)?.[1] || '';
      btn.classList.toggle('active', filters.type === val);
    }
    if (onClick.includes("setSort(")) {
      const val = onClick.match(/setSort\('(.*)'\)/)?.[1] || '';
      btn.classList.toggle('active', filters.sort === val);
    }
    if (onClick.includes("setLang(")) {
      const val = onClick.match(/setLang\('(.*)'\)/)?.[1] || '';
      btn.classList.toggle('active', filters.lang === val);
    }
    if (onClick.includes("setWarning(")) {
      const val = onClick.match(/setWarning\('(.*)'\)/)?.[1] || '';
      btn.classList.toggle('active', filters.warning === val);
    }
    if (onClick.includes("setLength(")) {
      const val = onClick.match(/setLength\('(.*)'\)/)?.[1] || '';
      btn.classList.toggle('active', filters.length === val);
    }
  });
  // Genre checkboxes
  document.querySelectorAll('.filter-check input').forEach(i => {
    i.checked = filters.genres.includes(i.value);
  });
}

function updateBrowseHeader() {
  const typeLabels = { '':'All Stories', novel:'Novels', manga:'Manga', comic:'Comics' };
  const title = filters.search
    ? `Results for "${filters.search}"`
    : (typeLabels[filters.type] || 'Browse Stories');
  document.getElementById('browse-title').innerHTML = title + ' <span>— VoomComix</span>';
  document.getElementById('results-count').textContent = `${totalCount} ${totalCount === 1 ? 'story' : 'stories'} found`;
}

function updateActivePills() {
  const pills = [];
  if (filters.type)    pills.push([`Type: ${filters.type}`, () => setType('')]);
  if (filters.lang)    pills.push([`Lang: ${filters.lang}`, () => setLang('')]);
  if (filters.warning) pills.push([`Rating: ${filters.warning}`, () => setWarning('')]);
  if (filters.length)  pills.push([`Length: ${filters.length}`, () => setLength('')]);
  filters.genres.forEach(g => pills.push([`Genre: ${g}`, () => toggleGenre(g)]));

  const el = document.getElementById('active-filters');
  el.innerHTML = pills.map(([label], i) => `
  <div class="filter-pill">
    ${label}
    <button onclick="clearPill(${i})">×</button>
  </div>`).join('');

  // Store callbacks
  el._callbacks = pills.map(([, fn]) => fn);
}

function clearPill(i) {
  document.getElementById('active-filters')._callbacks[i]();
}

function fmt(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000)    return (n/1000).toFixed(1)+'K';
  return n;
}
</script>
</body>
