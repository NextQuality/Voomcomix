<title>About — VoomComix</title>

<style>
:root{--bg:#0f0f14;--card:#141420;--red:#e63022;--gold:#f0a500;--white:#fdfaf4;--muted:#6a6478;--border:rgba(255,255,255,0.07);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Libre Baskerville',serif;}
a{text-decoration:none;color:inherit;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,13,13,0.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(230,48,34,0.2);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:.1em;}
.logo span{color:var(--red);}
.nav-r a{font-family:'Rajdhani';font-size:.8rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-left:24px;transition:color .2s;}
.nav-r a:hover{color:var(--white);}
.content{max-width:800px;margin:0 auto;padding:110px 40px 80px;}
h1{font-family:'Bebas Neue';font-size:3rem;letter-spacing:.05em;margin-bottom:8px;}
h1 span{color:var(--red);}
.sub{font-family:'Rajdhani';font-size:.75rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:40px;}
h2{font-family:'Bebas Neue';font-size:1.5rem;letter-spacing:.05em;color:var(--gold);margin:40px 0 12px;}
p{font-size:.95rem;line-height:1.9;color:rgba(253,250,244,.65);margin-bottom:16px;}
ul{padding-left:24px;margin-bottom:16px;}
li{font-size:.93rem;line-height:1.8;color:rgba(253,250,244,.6);margin-bottom:6px;}
.divider{border:none;border-top:1px solid var(--border);margin:48px 0;}
.highlight{background:rgba(230,48,34,.08);border-left:3px solid var(--red);padding:16px 20px;margin:24px 0;font-size:.9rem;color:rgba(253,250,244,.75);line-height:1.7;}
footer{border-top:1px solid var(--border);padding:30px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.foot-logo{font-family:'Bebas Neue';font-size:1.3rem;letter-spacing:.1em;}
.foot-logo span{color:var(--red);}
footer p{font-family:'Rajdhani';font-size:.7rem;color:var(--muted);}
.foot-links a{font-family:'Rajdhani';font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-left:16px;transition:color .2s;}
.foot-links a:hover{color:var(--red);}
@media(max-width:600px){.content{padding:90px 20px 60px;}nav{padding:0 20px;}footer{padding:24px 20px;flex-direction:column;text-align:center;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">VOOM<span>COMIX</span></a>
  <div class="nav-r">
    <a href="stories.html">Stories</a>
    <a href="about.html">About</a>
    <a href="terms.html">Terms</a>
  </div>
</nav>
